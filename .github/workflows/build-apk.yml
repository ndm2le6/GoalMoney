name: Build GoalMoney v2.0 Stable APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Show build environment
        run: |
          java -version
          gradle --version
          sdkmanager --list_installed

      - name: Build clean debug APK
        run: gradle --no-daemon --stacktrace clean assembleDebug

      - name: Verify APK exists
        run: test -s app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk GoalMoney-v2.0-Stable.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GoalMoney-v2.0-Stable-APK
          path: GoalMoney-v2.0-Stable.apk
          if-no-files-found: error
          retention-days: 30
